<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SleepyQuiz Arcane Overlay</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #050914;
      --panel: rgba(8, 16, 32, 0.84);
      --panel-strong: rgba(7, 12, 24, 0.94);
      --blue: #55c9ff;
      --blue-soft: rgba(85, 201, 255, 0.42);
      --blue-faint: rgba(85, 201, 255, 0.16);
      --text: #d8ecff;
      --muted: #a9c4d9;
      --answer: #dfffe6;
      --danger: #ff5f79;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      font-family: "Open Sans", Arial, sans-serif;
      background:
        radial-gradient(circle at 50% 45%, rgba(47, 125, 255, 0.18), transparent 34%),
        radial-gradient(circle at 20% 20%, rgba(85, 201, 255, 0.10), transparent 28%),
        linear-gradient(135deg, #02040a 0%, #08111f 44%, #03060d 100%);
      color: var(--text);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(circle, rgba(120, 210, 255, 0.24) 0 1px, transparent 1px),
        radial-gradient(circle, rgba(255, 255, 255, 0.13) 0 1px, transparent 1px);
      background-size: 86px 86px, 137px 137px;
      animation: drift 28s linear infinite;
      opacity: 0.45;
      pointer-events: none;
    }

    @keyframes drift {
      from { transform: translateY(0); }
      to { transform: translateY(86px); }
    }

    .frame {
      position: fixed;
      inset: 28px;
      border: 2px solid var(--blue-soft);
      box-shadow:
        0 0 10px rgba(85, 201, 255, 0.35),
        inset 0 0 18px rgba(85, 201, 255, 0.13);
      border-radius: 18px;
      pointer-events: none;
    }

    .frame::before,
    .frame::after {
      content: "✦";
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      color: var(--blue);
      font-size: 22px;
      text-shadow: 0 0 10px rgba(85, 201, 255, 0.65);
    }

    .frame::before { top: -17px; }
    .frame::after { bottom: -17px; }

    .app {
      position: relative;
      width: 100vw;
      height: 100vh;
      padding: 58px 70px;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 360px;
      gap: 34px;
      z-index: 1;
    }

    .app.viewer-only {
      grid-template-columns: minmax(0, 1fr);
      padding-left: clamp(50px, 8vw, 140px);
      padding-right: clamp(50px, 8vw, 140px);
    }

    .stage {
      min-width: 0;
      width: 100%;
      max-width: 1180px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 26px;
      padding-bottom: 10px;
    }

    .clock {
      text-align: center;
      padding: 12px 18px;
      color: var(--text);
      text-shadow: 0 0 8px rgba(85, 201, 255, 0.28);
    }

    .date-line {
      font-size: clamp(18px, 1.8vw, 28px);
      font-weight: 700;
      letter-spacing: 2px;
      color: #cdeeff;
    }

    .time-line {
      margin-top: 4px;
      font-size: clamp(34px, 4vw, 68px);
      font-weight: 800;
      letter-spacing: 2px;
      color: #f0fbff;
    }

    .question-card {
      position: relative;
      min-height: 300px;
      padding: 38px 46px;
      border-radius: 22px;
      background: linear-gradient(180deg, rgba(9, 18, 35, 0.88), rgba(5, 10, 21, 0.92));
      border: 1px solid rgba(124, 213, 255, 0.42);
      box-shadow:
        0 0 18px rgba(85, 201, 255, 0.18),
        inset 0 0 26px rgba(85, 201, 255, 0.08);
      overflow: hidden;
    }

    .question-card::before {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 50% 0%, rgba(85, 201, 255, 0.16), transparent 45%);
      pointer-events: none;
    }

    .label {
      position: relative;
      margin-bottom: 18px;
      font-size: 20px;
      font-weight: 800;
      letter-spacing: 2px;
      color: var(--blue);
      text-shadow: 0 0 7px rgba(85, 201, 255, 0.32);
    }

    .question-text {
      position: relative;
      font-size: clamp(30px, 3vw, 54px);
      font-weight: 700;
      line-height: 1.42;
      letter-spacing: 0.6px;
      color: var(--text);
      text-shadow: 0 0 6px rgba(85, 201, 255, 0.16);
    }

    .answer-box {
      position: relative;
      margin-top: 28px;
      padding: 22px 26px;
      border-left: 4px solid rgba(144, 255, 174, 0.7);
      border-radius: 12px;
      background: rgba(32, 80, 50, 0.22);
      color: var(--answer);
      font-size: clamp(24px, 2.3vw, 40px);
      font-weight: 700;
      line-height: 1.35;
      display: none;
    }

    .timer-wrap {
      height: 18px;
      border: 1px solid rgba(85, 201, 255, 0.34);
      border-radius: 999px;
      overflow: hidden;
      background: rgba(3, 7, 14, 0.85);
      box-shadow: inset 0 0 10px rgba(85, 201, 255, 0.10);
    }

    .timer-bar {
      height: 100%;
      width: 100%;
      background: linear-gradient(90deg, rgba(85, 201, 255, 0.25), rgba(85, 201, 255, 0.9));
      box-shadow: 0 0 14px rgba(85, 201, 255, 0.45);
      transition: width 0.3s linear;
    }

    .control-panel {
      align-self: center;
      max-height: calc(100vh - 116px);
      overflow-y: auto;
      scrollbar-color: rgba(85, 201, 255, 0.65) rgba(255, 255, 255, 0.08);
      scrollbar-width: thin;
      padding: 22px;
      border-radius: 20px;
      background: var(--panel-strong);
      border: 1px solid rgba(85, 201, 255, 0.32);
      box-shadow: 0 0 16px rgba(85, 201, 255, 0.16);
    }

    .control-panel.hidden {
      display: none;
    }

    .control-title {
      margin: 0 0 14px;
      font-size: 22px;
      font-weight: 800;
      color: var(--blue);
    }

    button,
    input,
    textarea,
    select {
      width: 100%;
      font-family: "Open Sans", Arial, sans-serif;
      font-size: 17px;
      border-radius: 10px;
      border: 1px solid rgba(85, 201, 255, 0.35);
      padding: 10px 12px;
    }

    button {
      cursor: pointer;
      margin-bottom: 10px;
      background: rgba(85, 201, 255, 0.12);
      color: var(--text);
      font-weight: 800;
      transition: transform 0.12s ease, background 0.12s ease;
    }

    button:hover {
      background: rgba(85, 201, 255, 0.22);
      transform: translateY(-1px);
    }

    input,
    textarea,
    select {
      margin-bottom: 12px;
      background: rgba(255,255,255,0.92);
      color: #07101c;
    }

    textarea {
      min-height: 96px;
      resize: vertical;
    }

    .small-label {
      margin: 4px 0 6px;
      color: #9ee8ff;
      font-size: 16px;
      font-weight: 800;
    }

    .divider {
      height: 1px;
      margin: 16px 0;
      background: rgba(85, 201, 255, 0.26);
    }

    .hint {
      font-size: 13px;
      line-height: 1.35;
      color: var(--muted);
    }

    @media (max-width: 900px) {
      .app {
        grid-template-columns: 1fr;
        padding: 42px 30px;
      }
      .control-panel {
        max-width: 520px;
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="frame"></div>

  <main id="app" class="app">
    <section class="stage">
      <div class="clock">
        <div id="dateLine" class="date-line">Loading date...</div>
        <div id="timeLine" class="time-line">Loading time...</div>
      </div>

      <div class="question-card">
        <div id="questionLabel" class="label">QUESTION 001</div>
        <div id="questionText" class="question-text">What organ pumps blood?</div>
        <div id="answerBox" class="answer-box">Heart</div>
      </div>

      <div class="timer-wrap">
        <div id="timerBar" class="timer-bar"></div>
      </div>
    </section>

    <aside id="controlPanel" class="control-panel">
      <h2 class="control-title">Arcane Controls</h2>
      <button onclick="togglePanel()">Hide Controls</button>
      <button onclick="nextQuestion()">Next Question</button>
      <button onclick="showAnswer()">Show Answer</button>
      <button onclick="toggleAutoMode()" id="autoModeButton">Auto Shift: OFF</button>

      <div class="small-label">Difficulty</div>
      <select id="difficultySelect" onchange="setDifficulty(this.value)">
        <option value="easy">Easy Questions</option>
        <option value="hard">Hard Questions</option>
      </select>
      <button onclick="startTimer()">Start Timer</button>
      <button onclick="pauseTimer()">Pause Timer</button>

      <div class="divider"></div>

      <div class="small-label">Question seconds</div>
      <input id="questionSeconds" type="number" value="60" min="5" max="600" />

      <div class="small-label">Answer seconds</div>
      <input id="answerSeconds" type="number" value="30" min="5" max="600" />

      <div class="small-label">Question Size</div>
      <input id="fontSizeSlider" type="range" min="24" max="84" value="52" oninput="changeQuestionSize(this.value)" />

      <div class="divider"></div>

      <div class="small-label">Add Question</div>
      <textarea id="newQuestion" placeholder="Type question here..."></textarea>
      <textarea id="newAnswer" placeholder="Type answer here..."></textarea>
      <button onclick="addQuestion()">Add Question</button>
      <p class="hint">Tip: press H to hide/show controls, N for next, A for answer, Space to start/pause.</p>
    </aside>
  </main>

  <script>
    const questionBanks = {
      easy: [
        {
          q: "What organ pumps blood?",
          a: "Heart"
        },
        {
          q: "Which organelle produces most of the cell's ATP?",
          a: "Mitochondria"
        },
        {
          q: "What type of bond links amino acids together in proteins?",
          a: "Peptide bond"
        }
      ],
      hard: [
        {
          q: "A patient has proximal muscle weakness, hypertension, and hypokalemia. Which endocrine abnormality should you suspect?",
          a: "Hyperaldosteronism or Cushing syndrome, depending on the full clinical picture."
        },
        {
          q: "A drug blocks the Na⁺/K⁺/2Cl⁻ cotransporter in the thick ascending limb. What electrolyte abnormality is classically associated?",
          a: "Hypokalemia, metabolic alkalosis, and increased calcium excretion."
        },
        {
          q: "A child has recurrent infections, absent thymic shadow, hypocalcemia, and conotruncal heart defects. What chromosome deletion is most likely?",
          a: "22q11 deletion, DiGeorge syndrome."
        }
      ]
    };

    let difficulty = "easy";
    let questions = questionBanks[difficulty];
    let currentIndex = 0;
    let timer = null;
    let remaining = 60;
    let total = 60;
    let timerMode = "question";
    let autoMode = false;

    function updateClock() {
      const now = new Date();
      document.getElementById("dateLine").textContent = now.toLocaleDateString("en-US", {
        weekday: "short",
        month: "short",
        day: "numeric",
        year: "numeric"
      }).toUpperCase();

      document.getElementById("timeLine").textContent = now.toLocaleTimeString("en-US", {
        hour: "numeric",
        minute: "2-digit",
        second: "2-digit",
        hour12: true
      });
    }

    function setDifficulty(level) {
      difficulty = level;
      questions = questionBanks[difficulty];
      currentIndex = 0;
      renderQuestion();
    }

    function renderQuestion() {
      const item = questions[currentIndex];
      document.getElementById("questionLabel").textContent = `QUESTION ${String(currentIndex + 1).padStart(3, "0")}`;
      document.getElementById("questionText").textContent = item.q;
      document.getElementById("answerBox").textContent = item.a;
      document.getElementById("answerBox").style.display = "none";
      timerMode = "question";
      resetTimer(Number(document.getElementById("questionSeconds").value || 60));
    }

    function nextQuestion() {
      currentIndex = (currentIndex + 1) % questions.length;
      renderQuestion();
      startTimer();
    }

    function toggleAutoMode() {
      autoMode = !autoMode;
      document.getElementById("autoModeButton").textContent = autoMode ? "Auto Shift: ON" : "Auto Shift: OFF";
      if (autoMode) startTimer();
    }

    function showAnswer() {
      document.getElementById("answerBox").style.display = "block";
      timerMode = "answer";
      resetTimer(Number(document.getElementById("answerSeconds").value || 30));
      startTimer();
    }

    function addQuestion() {
      const q = document.getElementById("newQuestion").value.trim();
      const a = document.getElementById("newAnswer").value.trim();
      if (!q || !a) return;

      questionBanks[difficulty].push({ q, a });
      questions = questionBanks[difficulty];
      document.getElementById("newQuestion").value = "";
      document.getElementById("newAnswer").value = "";
      currentIndex = questions.length - 1;
      renderQuestion();
    }

    function resetTimer(seconds) {
      pauseTimer();
      total = Math.max(1, seconds);
      remaining = total;
      updateTimerBar();
    }

    function updateTimerBar() {
      const percent = Math.max(0, remaining / total) * 100;
      document.getElementById("timerBar").style.width = `${percent}%`;
    }

    function startTimer() {
      pauseTimer();
      timer = setInterval(() => {
        remaining -= 1;
        updateTimerBar();
        if (remaining <= 0) {
          pauseTimer();
          if (timerMode === "question") {
            showAnswer();
          } else if (timerMode === "answer" && autoMode) {
            nextQuestion();
          }
        }
      }, 1000);
    }

    function pauseTimer() {
      if (timer) clearInterval(timer);
      timer = null;
    }

    function changeQuestionSize(size) {
      document.getElementById("questionText").style.fontSize = size + "px";
    }

    function togglePanel() {
      const panel = document.getElementById("controlPanel");
      const app = document.getElementById("app");
      panel.classList.toggle("hidden");
      app.classList.toggle("viewer-only", panel.classList.contains("hidden"));
    }

    document.addEventListener("keydown", (event) => {
      if (event.target.tagName === "TEXTAREA" || event.target.tagName === "INPUT") return;
      const key = event.key.toLowerCase();
      if (key === "h") togglePanel();
      if (key === "n") nextQuestion();
      if (key === "a") showAnswer();
      if (event.code === "Space") {
        event.preventDefault();
        timer ? pauseTimer() : startTimer();
      }
    });

    updateClock();
    setInterval(updateClock, 1000);
    renderQuestion();
  </script>
</body>
</html>
