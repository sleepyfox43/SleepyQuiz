<title>100 Fixed Questions</title>
<style>
body{margin:0;background:transparent;color:#a8ecff;font-family:Arial}
.display{position:absolute;bottom:20px;left:20px;max-width:520px;padding:12px;background:rgba(10,20,30,0.6);border-radius:12px}
.controls{position:absolute;top:20px;right:20px;width:320px;background:rgba(0,0,0,0.85);padding:12px;border-radius:12px}
.hidden{display:none}
button,input,textarea{margin:4px;width:95%}
textarea{height:60px}
</style>
</head>
<body>

<div class="display">
<div id="content"></div>
</div>

<div id="controls" class="controls">
<button onclick="toggle()">Hide</button><br>
<button onclick="next()">Next</button>
<button onclick="showAnswer()">Answer</button><br>
<input id="qTime" type="number" value="60"> Question sec<br>
<input id="aTime" type="number" value="30"> Answer sec<br>
<button onclick="start()">Start</button>
<button onclick="pause()">Pause</button>

<hr>
<b>Add Question</b>
<textarea id="newQ"></textarea>
<textarea id="newA"></textarea>
<button onclick="add()">Add</button>
</div>

let i=0, showA=false, timer=null;

function render(){
document.getElementById("content").innerText = showA?questions[i].a:questions[i].q;
}

function next(){i=(i+1)%questions.length;showA=false;render();}
function showAnswer(){showA=true;render();}

function cycle(){
let q=parseInt(qTime.value)*1000;
let a=parseInt(aTime.value)*1000;
timer=setTimeout(()=>{
showA=true;render();
setTimeout(()=>{next();cycle();},a);
},q);
}

function start(){clearTimeout(timer);cycle();}
function pause(){clearTimeout(timer);}
function toggle(){controls.classList.toggle("hidden");}

function add(){
let q=newQ.value,a=newA.value;
if(q&&a){questions.push({q:"Q: "+q,a:"A: "+a});newQ.value="";newA.value="";}
}

render();
